mapping_id: equity_earnings_continuation_h3_sector_map_v1
hypothesis_id: H3
status: static_seed_pending_historical_audit
as_of_contract: "2026-05-15"
description: >
  Sector and industry seed map for H3 earnings continuation. The map provides
  a versioned sector ETF proxy and coarse industry group for screening. It is
  not a final point-in-time GICS history.

historical_audit:
  primary_source: polygon_massive_ticker_overview
  endpoint: /v3/reference/tickers/{ticker}
  query_date_policy: query_ticker_details_as_of_event_date
  fields_to_capture:
    - cik
    - sic_code
    - sic_description
    - market_cap
    - active
    - delisted_utc
    - list_date
  sec_crosscheck: sec_sic_code_list_and_filing_headers
  promotion_requirement: >
    Freeze review requires either point-in-time sector/industry history from a
    vendor or a documented SIC/as-of-date audit showing sector proxy changes do
    not alter the selected result.

