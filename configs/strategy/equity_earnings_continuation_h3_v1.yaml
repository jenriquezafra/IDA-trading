strategy_id: equity_earnings_continuation_h3_v1
hypothesis_id: H3
description: >
  Earnings continuation intraday for liquid US equities. The strategy buys
  positive pre-market/after-market earnings reactions after the first 30
  regular-session minutes and exits at the same-session close. Screening is
  blocked until earnings timestamps and consensus snapshots are verified
  point-in-time.

status: contract_registered
timeframe: 5min
entry_rule: after_open_minutes

data:
  earnings_calendar_provider: polygon_benzinga_earnings
  earnings_calendar_audit_status: confirmed_source_pending_sample
  earnings_calendar_endpoint: /benzinga/v1/earnings
  earnings_calendar_entitlement_required: true
  earnings_calendar_purchase_required: true
  earnings_calendar_purchase_blocking_for_real_dataset: true
  earnings_calendar_public_price_observed_2026_05_15: 99_usd_per_month_individual
  earnings_calendar_docs:
    - https://polygon.io/docs/rest/partners/benzinga/earnings
    - https://docs.benzinga.com/api-reference/calendar_api/earnings/returns-the-earnings-data
    - https://www.benzinga.com/apis/cloud-product/corporate-earnings/
  consensus_provider: polygon_benzinga_earnings
  consensus_audit_status: confirmed_source_pending_snapshot_audit
  consensus_fields:
    eps_consensus:
      polygon_massive: estimated_eps
      benzinga_direct: eps_est
    revenue_consensus:
      polygon_massive: estimated_revenue
      benzinga_direct: revenue_est
    consensus_updated_at:
      polygon_massive: last_updated
      benzinga_direct: updated
  consensus_snapshot_audit_required: true
  consensus_revision_policy:
    rule: hard_reject_without_pre_event_snapshot
    require_snapshot_at_or_before_report_timestamp: true
    reject_post_event_revised_consensus_without_prior_snapshot: true
    reject_vendor_surprise_without_recomputable_inputs: true
    require_raw_payload_or_record_hash: true
    eps_consensus_missing_policy: exclude_event
    revenue_consensus_missing_policy: exclude_event
  guidance_provider: polygon_benzinga_guidance
  guidance_audit_status: source_exists_deferred_v1
  guidance_endpoint: /benzinga/v1/guidance
  guidance_docs:
    - https://polygon.io/docs/rest/partners/benzinga/corporate-guidance
    - https://docs.benzinga.com/api-reference/calendar-api/get-guidance
    - https://docs.benzinga.com/api-reference/guides/guidance-process-explained
    - https://www.benzinga.com/apis/cloud-product/corporate-guidance/
  guidance_policy: excluded_v1_candidate_v2
  intraday_provider: polygon_massive_stocks
  intraday_audit_status: confirmed_source_pending_coverage_audit
  intraday_primary_access: flat_files
  intraday_primary_dataset: us_stocks_sip/minute_aggs_v1
  intraday_sample_access: rest_custom_bars
  intraday_sample_endpoint: /v2/aggs/ticker/{stocksTicker}/range/{multiplier}/{timespan}/{from}/{to}
  intraday_docs:
    - https://polygon.io/docs/rest/stocks/aggregates/custom-bars
    - https://polygon.io/docs/flat-files/stocks/overview
    - https://polygon.io/docs/flat-files/stocks/minute-aggregates/2023
  intraday_raw_timeframe: 1min
  intraday_derived_timeframe: 5min
  intraday_min_entitlement: all_history_or_business_equivalent
  quotes_provider: polygon_massive_stocks
  quotes_audit_status: confirmed_proxy_with_quote_audit
  quotes_primary_access: flat_files
  quotes_primary_dataset: us_stocks_sip/quotes_v1
  quotes_sample_access: rest_nbbo_quotes
  quotes_docs:
    - https://polygon.io/docs/rest/stocks/quotes
    - https://polygon.io/docs/flat-files/stocks/quotes/2023
    - https://polygon.io/docs/flat-files/stocks/overview
  quote_proxy_policy: conservative_bps_until_sample_audit
  market_calendar_provider: pandas_market_calendars_xnys
  market_calendar_audit_status: rules_registered_pending_sample_audit
  market_calendar_crosscheck_docs:
    - https://polygon.io/docs/rest/stocks/market-operations/market-status
    - https://polygon.io/docs/rest/stocks/market-operations/market-holidays
  halt_provider: nasdaq_trader
  halt_audit_status: rules_registered_pending_sample_audit
  halt_docs:
    - https://nasdaqtrader.com/trader.aspx?id=TradingHaltHistory
    - https://www.nasdaqtrader.com/Trader.aspx?id=TradeHaltCodes
  corporate_actions_provider: polygon_massive_reference_actions
  corporate_actions_audit_status: rules_registered_pending_sample_audit
  splits_endpoint: /v3/reference/splits
  dividends_endpoint: /v3/reference/dividends
  ticker_events_endpoint: /vX/reference/tickers/{id}/events
  corporate_actions_docs:
    - https://polygon.io/docs/rest/stocks/corporate-actions/splits
    - https://polygon.io/docs/rest/stocks/corporate-actions/dividends
    - https://polygon.io/docs/rest/stocks/corporate-actions/ticker-events
  sector_mapping_provider: h3_static_seed_with_polygon_sic_historical_audit
  sector_mapping_status: static_seed_pending_historical_audit
  sector_mapping_path: configs/strategy/equity_earnings_continuation_h3_sector_map_v1.yaml
  sector_mapping_docs:
    - https://massive.com/docs/rest/stocks/tickers/ticker-overview
    - https://www.sec.gov/search-filings/standard-industrial-classification-sic-code-list
  peer_proxy_provider: sector_etf_proxy_v1
  peer_proxy_status: sector_etf_proxy_ok_for_screening_pending_coverage_audit
  peer_proxy_path: configs/strategy/equity_earnings_continuation_h3_peer_proxy_v1.yaml
  timestamp_timezone: America/New_York
  storage_timezone: UTC
  calendar: XNYS
  regular_session: "09:30-16:00"
  exclude_half_days: true
  timezone_session_policy:
    require_utc_and_et_timestamps: true
    reject_naive_timestamps: true
    entry_exit_calendar_filter_status: implemented_calendar_level_pending_intraday_bar_audit
    session_label_timezone: America/New_York
    regular_open: "09:30"
    regular_close: "16:00"
    entry_time: "10:00"
    latest_allowed_entry_time: "10:05"
    expected_1m_bars: 390
    expected_5m_bars: 78
    dst_sample_audit_required: true
  halt_policy:
    exclude_official_halts: true
    exclude_suspected_bad_sessions: true
    entry_window: "09:30-10:05"
    exit_window: regular_close
  corporate_actions_policy:
    split_adjustment_required: true
    exclude_unreconciled_splits: true
    flag_special_cash_dividends: true
    exclude_unstable_ticker_identity: true
  exclusion_feature_policy:
    macro_calendar_path: data/events/macro/h3_v1/macro_exclusion_sessions.parquet
    halt_events_path: data/events/halts/h3_v1/halt_events.parquet
    quote_quality_path: data/events/quality/h3_v1/quote_spread_30m.parquet
    binary_news_path: data/events/news/h3_v1/binary_news_events.parquet
    high_spread_threshold_bps: 10.0
    simultaneous_peer_scope: same_sector_same_event_session
    missing_optional_exclusion_tables_policy: allow_development_block_screening
  intraday_panel_path: data/aligned/equities/5min/h3_v1/panel.parquet
  intraday_raw_dir: data/raw/polygon/equities/1min/h3_v1
  intraday_derived_dir: data/aligned/equities/5min/h3_v1
  earnings_raw_payload_path: data/raw/polygon/benzinga/earnings/h3_v1/earnings_raw.json
  earnings_events_path: data/events/earnings/h3_v1/earnings_events.parquet
  earnings_events_timing_partitions:
    pre_market: data/events/earnings/h3_v1/earnings_events_pre_market.parquet
    after_market: data/events/earnings/h3_v1/earnings_events_after_market.parquet
    excluded_timing: data/events/earnings/h3_v1/earnings_events_excluded_timing.parquet
  point_in_time_requirements:
    report_timestamp_real: true
    sample_payload_audit_before_screening: true
    intraday_coverage_audit_before_screening: true
    quote_or_proxy_sample_audit_before_screening: true
    peer_proxy_coverage_audit_before_screening: true
    timezone_session_halt_ca_audit_before_screening: true
    historical_sector_mapping_audit_before_promotion: true
    eps_consensus_snapshot_before_event: true
    revenue_consensus_snapshot_before_event: true
    adjusted_intraday_prices: true
    no_post_event_consensus_revisions: true
    reject_revised_post_event_consensus_without_snapshot: true

universe:
  mode: fixed_liquid_us_seed_with_event_date_filters
  as_of_contract: "2026-05-15"
  research_period:
    start_date: "2016-01-01"
    end_date: "2025-12-31"
    extension_policy: require_new_contract_or_revision_manifest
