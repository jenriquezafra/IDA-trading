  eligibility:
    min_market_cap_usd: 20000000000
    min_median_dollar_volume_20d_usd: 100000000
    min_price_usd: 10.0
    min_regular_session_coverage_pct: 0.98
    require_earnings_timestamp: true
    require_eps_consensus: true
    require_revenue_consensus: true
    require_pre_event_consensus_snapshot: true
  exclusions:
    security_types:
      - adr
      - etf
      - fund
      - preferred
      - duplicate_share_class
    event_flags:
      - m_and_a
      - fda_binary
      - fraud_or_litigation
      - trading_halt
      - bad_corporate_action_adjustment
      - unreconciled_split
      - unstable_ticker_identity
      - high_spread
      - binary_news_event
      - missing_pre_event_eps_consensus_snapshot
      - missing_pre_event_revenue_consensus_snapshot
      - post_event_revised_consensus_without_snapshot
      - macro_dominant_session
      - simultaneous_core_peer_earnings

events:
  allowed_report_timings:
    - pre_market
    - after_market
  excluded_report_timings:
    - during_session
    - unknown_time
  report_time_rules:
    pre_market:
      definition: report_timestamp_et < "09:30"
      event_session: same_xnys_session
      entry_session: event_session
    after_market:
      definition: report_timestamp_et >= "16:00"
      event_session: next_xnys_session
      entry_session: event_session
    during_session:
      definition: report_timestamp_et_between_09_30_and_16_00
      policy: exclude_v1
    unknown_time:
      policy: exclude_v1
  entry:
    opening_window_minutes: 30
    entry_time: "10:00"
    entry_price: next_bar_open_at_or_after_entry_time
    latest_allowed_entry_time: "10:05"
  exit:
    primary_exit: same_session_close
    primary_exit_time: "16:00"
    secondary_exits:
      - t_plus_1_open
      - t_plus_1_10_30
      - t_plus_1_close

features:
  fundamental:
    surprise_zscore:
      method: expanding_prior_universe_sessions
      basis: actual_minus_pre_event_consensus_over_abs_consensus
      min_history: 20
      eps_consensus_abs_floor: 0.01
      revenue_consensus_abs_floor: 1.0
      same_session_events_excluded_from_fit: true
      future_events_excluded_from_fit: true
    eps_surprise_z:
      source: actual_vs_pre_event_consensus
      fit_on: prior_event_sessions_only
    revenue_surprise_z:
      source: actual_vs_pre_event_consensus
      fit_on: prior_event_sessions_only
    guidance:
      policy: excluded_v1_candidate_v2
      source_candidate: polygon_benzinga_guidance
      reason: keep_h3_v1_screening_on_eps_revenue_gap_volume_sector_confirmation
  opening_reaction:
    gap_atr:
      formula: event_session_open_gap_div_recent_atr
      atr_lookback_sessions: 20
      atr_min_history_sessions: 20
      gap_return_formula: event_session_open_div_previous_regular_close_minus_1
      atr_return_formula: daily_true_range_div_reference_close
      fit_on: prior_symbol_sessions_only
    rel_volume_30m:
      formula: first_30m_volume_div_ticker_time_of_day_median
      expected_volume_formula: rolling_prior_symbol_sessions_median
      fit_on: prior_symbol_sessions_only
      lookback_sessions: 60
      min_history_sessions: 20
      opening_window_minutes: 30
      expected_5m_bars: 6
    vwap_30m:
      source: first_30_regular_minutes
      formula: volume_weighted_bar_vwap_or_close_proxy
      preferred_bar_field: bar_vwap
      fallback_bar_field: close
      expected_5m_bars: 6
      missing_policy: exclude_event
    range_30m:
      source: first_30_regular_minutes
      fields:
        high: range_high_30m
        low: range_low_30m
        close: close_30m
      expected_5m_bars: 6
      missing_policy: exclude_event
  confirmation:
    peer_proxy:
      policy: sector_etf_proxy_v1
      config_path: configs/strategy/equity_earnings_continuation_h3_peer_proxy_v1.yaml
      fallback: SPY
      firm_level_peer_baskets: deferred_v2
    sector_proxy:
      mapping_path: configs/strategy/equity_earnings_continuation_h3_sector_map_v1.yaml
      fallback: SPY
      sector_etfs:
        communication_services: XLC
        consumer_discretionary: XLY
        consumer_staples: XLP
        energy: XLE
        financials: XLF
        healthcare: XLV
        industrials: XLI
        materials: XLB
        real_estate: XLRE
        technology: XLK
        utilities: XLU
    sector_return_30m:
      source: sector_etf_peer_proxy_first_30m_return
      return_formula: first_30m_close_div_first_30m_open_minus_1
      fallback: SPY_if_sector_etf_missing
      missing_policy: exclude_if_no_sector_mapping_or_no_proxy_return
    peer_proxy_return_30m:
      source: sector_etf_peer_proxy_first_30m_return
      return_formula: first_30m_close_div_first_30m_open_minus_1
      fallback: SPY_if_sector_etf_missing
      missing_policy: exclude_if_no_sector_mapping_or_no_proxy_return

signal:
  side: long_only
  filters:
    - field: eps_surprise_z
      operator: ">"
      value: 0.0
      fitted_on: fixed_rule
    - field: revenue_surprise_z
      operator: ">="
      value: 0.0
      fitted_on: fixed_rule
    - field: gap_atr
      operator: between
      min_value: 0.25
      max_value: 2.50
      fitted_on: fixed_rule
    - field: rel_volume_30m
      operator: ">="
      fit_on: train_fold
      quantile: 0.60
    - field: close_30m
      operator: ">="
      field_value: vwap_30m
      fitted_on: fixed_rule
    - field: sector_return_30m
      operator: ">="
      value: -0.001
      fitted_on: fixed_rule
    - field: exclusion_flags
      operator: "=="
      value: none
      fitted_on: fixed_rule

position:
  type: single_name_equity
  side: long_only
  sizing: fixed_notional
  gross_exposure: 1.0
  max_positions_per_session: 10
  max_symbol_weight_per_session: 0.20
  hedge:
    enabled: false
    residual_measurement_only: true

costs:
  source: proxy_conservative_bps_until_quote_sample_audit
  round_trip_bps:
    base: 5.0
    conservative: 10.0
    stress: 20.0
  components:
    commission_bps_round_trip: included_in_proxy
    spread_bps_round_trip: included_in_proxy
    slippage_bps_round_trip: included_in_proxy
    impact_bps_round_trip: included_in_proxy
  quote_calibration:
    source: polygon_massive_stocks_quotes
    sample_tickers: [AAPL, MSFT, NVDA, JPM, XOM]
    event_sample_min_count: 20
    entry_window: around_10_00_et
    exit_window: around_regular_close
    raise_conservative_cost_if_p90_exceeds_bps: 10.0
  delay_sensitivity_minutes:
    - 5
    - 15
    - 30

controls:
  earnings_beat_only: true
  gap_only: true
  intraday_momentum_no_event: true
  random_same_frequency_by_ticker: true
  same_hour_by_ticker: true
  sector_proxy_equivalent: true
  random_seed: 3003

split_policy:
  train_months: 36
  validation_months: 6
  test_months: 6
  step_months: 6
  embargo_sessions: 1
  threshold_fit_split: train
  selection_split: validation
  confirmation_split: test

outputs:
  output_dir: results/strategy/equity_earnings_continuation/5min
  screening_output_dir: results/strategy/equity_earnings_continuation/5min/phase3_screening
  strategy_output_dir: results/strategy/equity_earnings_continuation/5min/h3_v1
  artifacts:
    manifest: manifest.yaml
    data_audit: data_audit.md
    coverage: coverage.parquet
    earnings_events: earnings_events.parquet
    earnings_events_pre_market: earnings_events_pre_market.parquet
    earnings_events_after_market: earnings_events_after_market.parquet
    earnings_events_excluded_timing: earnings_events_excluded_timing.parquet
    events: events.parquet
    trades: trades.parquet
    daily: daily.parquet
    monthly: monthly.parquet
    summary: summary.parquet
    distribution: distribution.parquet
    thresholds: thresholds.parquet
    report: report.md

promotion_gates:
  min_validation_trades: 200
  min_test_trades: 100
  validation_net_return_conservative_gt: 0.0
  test_net_return_conservative_gt: 0.0
  avg_trade_net_stress_bps_gt: 0.0
  hit_rate_bootstrap_diff_vs_random_lower_ci_gt: 0.0
  hit_rate_bootstrap_diff_vs_same_hour_lower_ci_gt: 0.0
  max_top5_abs_pnl_share: 0.50
  min_active_sectors: 4
  max_sector_pnl_share: 0.50
  max_symbol_pnl_share: 0.25
  must_beat_controls:
    - gap_only
    - earnings_beat_only
    - sector_proxy_equivalent
  robustness:
    doubled_costs_net_positive: true
    entry_delay_15m_net_positive: true
    validation_selects_test_confirms_once: true
