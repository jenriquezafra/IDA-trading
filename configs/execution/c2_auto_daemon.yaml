daemon:
  auto_runner_config_path: configs/execution/c2_auto_runner.yaml
  open_scan_interval_seconds: 60
  pre_open_wakeup_minutes: 15
  pre_open_scan_interval_seconds: 60
  active_reconciliation_interval_seconds: 60
  error_sleep_seconds: 300
  max_error_sleep_seconds: 900
  calendar: NYSE
  skip_cboe: true
  skip_download: false

outputs:
  output_dir: results/paper/c2_auto_runner
  status_path: results/paper/c2_auto_runner/daemon_status.yaml
  events_path: results/paper/operational_events/events.jsonl
