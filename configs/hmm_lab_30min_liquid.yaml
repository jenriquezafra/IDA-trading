project:
  name: ida-trading
  timezone: America/New_York
  frequency: 30min
lab:
  target_symbol: SPY
  target_profile: broad_market
  timeframe: 30min
  provider: polygon
  start_date: '2021-05-01'
  end_date: '2026-05-01'
  universe_config: configs/universes/core_cross_asset.yaml
  universe_id: core_cross_asset_v1
  context_key: context_universe_core
  benchmark_key: benchmark_universe
  include_target_in_context: true
  optional_symbols: []
polygon:
  api_key_env: POLYGON_API_KEY
  source_interval: 5m
  adjusted: true
  default_years: 5
paths:
  raw_dir: data/raw/polygon
  cleaned_dir: data/cleaned
  aligned_dir: data/aligned
  features_dir: data/features
  models_dir: models/30min_liquid
  results_dir: results/30min_liquid
  metadata_dir: data/metadata
  reports_dir: reports/30min_liquid
  data_coverage_dir: reports/30min_liquid/data_coverage
  alignment_dir: reports/30min_liquid/alignment
session:
  market_open: 09:30
  market_close: '16:00'
  timestamp_label: start
  regular_session_only: true
  drop_incomplete_sessions: true
  expected_bars_per_session: 13
calendar:
  enabled: true
  name: NYSE
  drop_non_trading_days: true
  drop_half_days: true
quality:
  drop_duplicate_timestamps: true
  drop_critical_nan_rows: true
  drop_invalid_price_rows: true
  drop_negative_volume_rows: true
  drop_extreme_range_rows: true
  max_bar_range_bps: 1000.0
labeling:
  horizon_bars: 2
  buffer_bps: 0.5
  lambda_vol: 0.25
  round_trip_cost_bps: 1.0
backtest:
  no_new_trades_after: '15:45'
  force_flat_before: '15:55'
alignment:
  missing_policy: drop_core_missing
  core_symbols_required: true
hmm_lab:
  feature_set_version: cross_asset_v2_30min
  features_config: configs/features/cross_asset_30min_v2.yaml
  covariance_type: diag
  n_iter: 50
  min_covar: 0.0001
  k_values:
  - 3
  - 4
  - 5
  - 6
  seeds:
  - 42
  - 7
  max_folds: 2
  min_state_frequency: 0.01
  save_posteriors: true
  feature_sets:
  - name: target_only_frozen
    description: Target-only proxy for the frozen SPY-only baseline using the reusable
      target_* columns.
    columns:
    - target_ret_3
    - target_ret_6
    - target_ret_12
    - target_range_ratio_6_24
    - target_signed_efficiency_12
    - target_dir_persistence_12
    - target_dist_vwap_atr
    - target_dist_open
    - target_pos_session_range
    - target_intraday_runup
  - name: cross_asset_minimal
    description: Target structure plus compact regime scores.
    columns:
    - target_ret_3
    - target_ret_6
    - target_ret_12
    - target_range_ratio_6_24
    - target_signed_efficiency_12
    - target_dir_persistence_12
    - target_dist_vwap_atr
    - target_dist_open
    - target_pos_session_range
    - risk_on_score
    - risk_off_score
    - defensive_rotation_score
    - narrow_rally_score
    - chop_score
  - name: cross_asset_sectors
    description: Equity breadth, sector leadership and cyclical/defensive rotation.
    columns:
    - target_ret_3
    - target_ret_6
    - target_ret_12
    - target_signed_efficiency_12
    - target_dist_vwap_atr
    - relret_QQQ_SPY_6
    - relret_IWM_SPY_6
    - relret_DIA_SPY_6
    - relret_XLK_SPY_6
    - relret_XLP_SPY_6
    - spread_growth_defensive_12
    - spread_cyclicals_defensive_12
    - spread_tech_broad_12
    - positive_index_count_6
    - positive_sector_count_6
    - sector_above_vwap_count
    - sector_rel_strength_count_12
    - leadership_concentration_score_12
    - narrow_rally_score
    - defensive_rotation_score
  - name: cross_asset_macro
    description: Equity versus duration, credit, gold and volatility expansion.
    columns:
    - target_ret_3
    - target_ret_6
    - target_ret_12
    - target_range_ratio_6_24
    - target_dist_vwap_atr
    - relret_TLT_SPY_12
    - relret_IEF_SPY_12
    - relret_GLD_SPY_12
    - relret_HYG_LQD_12
