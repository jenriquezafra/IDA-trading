    - sector_range_dispersion_12
    - cross_asset_vol_expansion_score
    - intraday_stress_score
    - risk_on_score
    - risk_off_score
  - name: cross_asset_full_core
    description: Full compact cross-asset v1 HMM column set from the feature config.
    columns: __hmm_feature_columns__
