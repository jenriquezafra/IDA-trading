project:
  name: ida-trading
  timezone: America/New_York
  frequency: 15min
lab:
  target_symbol: SPY
  timeframe: 15min
  universe_id: core_cross_asset_v1
paths:
  features_dir: data/features
  results_dir: results/h9_setup_first/spy_qqq_ko_amd_googl_15min_24_6_6_step3
  reports_dir: reports/h9_setup_first/spy_qqq_ko_amd_googl_15min_24_6_6_step3
hmm_lab:
  feature_set_version: cross_asset_liquid_15min
  features_config: configs/features/cross_asset_15min_liquid.yaml
  max_folds: 9
  walk_forward:
    train_months: 24
    validation_months: 6
    test_months: 6
    step_months: 3
setup_signal_search:
  horizons: [2, 4, 8, 12]
  families:
    - opening_range_breakout
    - opening_bias_followthrough
    - gap_fill
    - vwap_stretch_reversal
    - breakdown_short_risk_off
  rel_volume_quantiles: [0.33, 0.50, 0.67, 0.75]
  wick_quantiles: [0.60, 0.75]
  range_ratio_quantiles: [0.33, 0.50]
  close_location_thresholds: [0.45, 0.55, 0.65, 0.70]
  vwap_abs_mins: [0.0, 0.25, 0.50]
  opening_bias_followthrough:
    enabled: true
    directions: [long, short]
    rel_volume_quantiles: [0.33, 0.50, 0.67]
    close_location_thresholds: [0.45, 0.55, 0.65]
    vwap_floors: [-0.25, 0.0]
    vwap_ceilings: [0.75, 1.25]
    dist_open_mins: [0.0]
    filter_sets:
      - name: bias30_basic
        bias_attempts_min: 1
        min_minutes_from_open: 30
        min_minutes_to_close: 45
      - name: bias30_breadth
        bias_attempts_min: 1
        positive_index_min: 2
        positive_sector_min: 4
        min_minutes_from_open: 30
        min_minutes_to_close: 45
      - name: bias30_vwap_breadth
        bias_attempts_min: 1
        index_above_vwap_min: 3
        sector_above_vwap_min: 5
        min_minutes_from_open: 30
        min_minutes_to_close: 45
      - name: bias30_accel
        bias_attempts_min: 1
        rel_volume_accel_q: 0.50
        positive_index_min: 2
        positive_sector_min: 4
        min_minutes_from_open: 30
        min_minutes_to_close: 45
  gap_low_quantile: 0.25
  gap_high_quantile: 0.75
  gap_fill_progress_mins: [0.20, 0.50]
  risk_off_quantiles: [0.60, 0.75]
  breadth_low_quantile: 0.33
  cost_scenarios: [ibkr_tiered_10000, bps_2, bps_5]
  primary_cost_scenario: ibkr_tiered_10000
  conservative_cost_scenario: bps_2
  stress_cost_scenario: bps_5
  min_trades: 30
  min_profit_factor: 1.05
  min_daily_sharpe: 0.30
  max_drawdown: 0.40
  max_top_day_abs_net_share: 0.30
  max_top_month_abs_net_share: 0.50
  require_base_segment_improvement: true
  max_selected: 220
  report_top_rows: 80
  signal_columns:
    - target_overnight_ret
    - target_abs_overnight_ret
    - target_gap_fill_progress
    - target_dist_open
    - target_dist_vwap_atr
    - target_range_ratio_2_8
    - target_rv_4_rel_by_bar
    - target_rel_volume_by_bar
    - target_rel_cum_volume_by_bar
    - target_close_location_bar
    - target_bar_efficiency
    - target_upper_wick_ratio
    - target_lower_wick_ratio
    - target_above_or_2_high
    - target_below_or_2_low
    - target_failed_breakout_high_4
    - target_failed_breakout_low_4
    - target_breaks_roll_high_4
    - target_breaks_roll_low_4
    - target_first_60m
    - target_lunch
    - target_last_60m
    - target_minutes_from_open
    - target_minutes_to_close
    - target_breakout_attempt_count_or_2_high
    - target_breakout_attempt_count_or_2_low
    - target_above_or_2_high_persist_2
    - target_below_or_2_low_persist_2
    - target_rel_volume_accel_2
    - index_above_vwap_count
    - sector_above_vwap_count
    - risk_on_score
    - risk_off_score
    - positive_index_count_2
    - positive_sector_count_2
  column_map:
    range_ratio: target_range_ratio_2_8
    rv_rel: target_rv_4_rel_by_bar
    opening_high: target_above_or_2_high
    opening_low: target_below_or_2_low
    opening_high_attempts: target_breakout_attempt_count_or_2_high
    opening_low_attempts: target_breakout_attempt_count_or_2_low
    opening_high_persistence: target_above_or_2_high_persist_2
    opening_low_persistence: target_below_or_2_low_persist_2
    rel_volume_accel: target_rel_volume_accel_2
    failed_breakout_high: target_failed_breakout_high_4
    failed_breakout_low: target_failed_breakout_low_4
    breaks_roll_high: target_breaks_roll_high_4
    breaks_roll_low: target_breaks_roll_low_4
    positive_index_count: positive_index_count_2
    positive_sector_count: positive_sector_count_2
setup_signal_multiasset:
  targets: [SPY, QQQ, KO, AMD, GOOGL]
  results_dir: results/h9_setup_first/spy_qqq_ko_amd_googl_15min_24_6_6_step3/_multiasset
  reports_dir: reports/h9_setup_first/spy_qqq_ko_amd_googl_15min_24_6_6_step3/_multiasset
  min_targets: 3
  min_research_targets: 3
  min_primary_positive_targets: 3
  min_stress_nonnegative_targets: 2
  report_top_rows: 80
candidate_cost_sensitivity_cross_asset:
  cost_bps: [1.0, 2.0, 5.0]
  ibkr:
    enabled: true
    plans: [tiered, fixed]
    notionals_usd: [5000, 10000, 25000]
    spread_slippage_bps_round_trip: 1.5
    tiered_commission_per_share_usd: 0.0035
    tiered_min_commission_per_order_usd: 0.35
    tiered_clearing_per_share_per_side_usd: 0.0002
    fixed_commission_per_share_usd: 0.005
    fixed_min_commission_per_order_usd: 1.0
    max_commission_pct_trade_value: 0.01
    sec_fee_rate_on_sell: 0.0000206
    finra_taf_per_share_on_sell_usd: 0.000195
    finra_taf_cap_usd: 9.79
