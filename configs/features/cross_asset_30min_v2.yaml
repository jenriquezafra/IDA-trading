  - target_dist_prev_low_atr
  - target_breakout_margin_or_1_high_atr
  - target_breakdown_margin_or_1_low_atr
  - target_or_1_range_atr
  - target_above_or_1_high_persist_2
  - target_breakout_attempt_count_or_1_high
  - target_rel_volume_by_bar
  - target_rel_cum_volume_by_bar
  - target_rel_volume_accel_2
  - target_rv_2_rel_by_bar
