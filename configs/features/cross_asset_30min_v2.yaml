feature_set_version: cross_asset_v2_30min
description: Causal 30min feature set focused on breakout quality, cross-asset confirmation, volume confirmation and prior daily levels.

return_windows: [1, 2, 3, 4, 6, 8, 12, 24]
range_ratio_short_window: 1
range_ratio_long_window: 4
range_ratio_windows:
  - [1, 4]
  - [2, 8]
efficiency_window: 2
efficiency_windows: [2, 4, 12]
vwap_slope_window: 2
vwap_slope_windows: [2, 4, 12]
atr_windows: [2, 4, 12]
frequency: 30min
breadth_windows: [1, 2, 4, 6, 12]

setup_features:
  opening_range_bars: [1, 2, 4, 6, 12]
  rolling_breakout_windows: [2, 4, 6, 8]
  realized_vol_windows: [1, 2, 4, 6, 12]
  expected_by_bar_min_periods: 20
  atr_column: target_atr_2
  breakout_persistence_windows: [2, 3]
  volume_accel_windows: [2, 4]
  lunch_start: "12:00"
  lunch_end: "14:00"

groups:
  indices: [SPY, QQQ, IWM, DIA]
  sectors: [XLK, XLF, XLE, XLV, XLY, XLP, XLU]
  growth: [QQQ, XLK, XLY]
  cyclicals: [IWM, XLY, XLF, XLE]
  defensives: [XLP, XLV, XLU]
  bonds: [TLT, IEF]
  credit_risk: [HYG]
  credit_quality: [LQD]
  haven: [TLT, IEF, GLD]
  commodities: [GLD, USO]

hmm_feature_columns:
  - target_ret_1
  - target_ret_2
  - target_ret_4
  - target_ret_6
